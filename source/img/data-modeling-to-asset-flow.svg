<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">数据进仓后的分层与建模链路</title>
  <desc id="desc">数据从 ODS 原始入口开始，经过业务过程识别、粒度声明、DWD 明细事实、DIM 一致维度、DWM 公共汇总、DM 分析宽表，最终进入 APP 报表、接口和数据产品。</desc>
  <defs>
    <linearGradient id="top" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ea5d9"/>
      <stop offset="50%" stop-color="#63b77c"/>
      <stop offset="100%" stop-color="#f0b35a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#101828" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#5b6575"/>
    </marker>
    <style>
      .title{font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:36px;font-weight:750;fill:#18202f}
      .subtitle{font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:18px;fill:#667085}
      .label{font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:15px;font-weight:700}
      .card-title{font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:23px;font-weight:750;fill:#18202f}
      .text{font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:16px;fill:#475467}
      .small{font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:14px;fill:#667085}
      .arrow{stroke:#5b6575;stroke-width:3;marker-end:url(#arrow);fill:none}
    </style>
  </defs>

  <rect width="1440" height="760" fill="#f7f9fc"/>
  <rect x="64" y="52" width="1312" height="656" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="112" y="104" width="1216" height="4" rx="2" fill="url(#top)"/>

  <text x="112" y="164" class="title">数据进仓后的分层与建模链路</text>
  <text x="112" y="198" class="subtitle">从原始记录到明细事实、一致维度、公共指标和分析宽表</text>

  <rect x="112" y="252" width="184" height="178" rx="16" fill="#eef5ff" stroke="#b9d7ff"/>
  <text x="138" y="292" class="label" fill="#275d99">01 / ODS</text>
  <text x="138" y="329" class="card-title">原始入口</text>
  <text x="138" y="366" class="text">贴源记录</text>
  <text x="138" y="394" class="text">分区 / 水位</text>

  <path d="M296 341 H352" class="arrow"/>

  <rect x="364" y="252" width="184" height="178" rx="16" fill="#f3f6fb" stroke="#ced8e8"/>
  <text x="390" y="292" class="label" fill="#5b6575">02 / 建模输入</text>
  <text x="390" y="329" class="card-title">业务过程</text>
  <text x="390" y="366" class="text">选择事件</text>
  <text x="390" y="394" class="text">声明粒度</text>

  <path d="M548 341 H604" class="arrow"/>

  <rect x="616" y="252" width="184" height="178" rx="16" fill="#fff7eb" stroke="#f3d09b"/>
  <text x="642" y="292" class="label" fill="#a86413">03 / DWD</text>
  <text x="642" y="329" class="card-title">明细事实</text>
  <text x="642" y="366" class="text">清洗标准化</text>
  <text x="642" y="394" class="text">业务规则下沉</text>

  <path d="M800 341 H856" class="arrow"/>

  <rect x="868" y="252" width="184" height="178" rx="16" fill="#eefaf3" stroke="#b8dfc6"/>
  <text x="894" y="292" class="label" fill="#2f7b4f">04 / DIM</text>
  <text x="894" y="329" class="card-title">一致维度</text>
  <text x="894" y="366" class="text">分析上下文</text>
  <text x="894" y="394" class="text">统一口径</text>

  <path d="M1052 341 H1108" class="arrow"/>

  <rect x="1120" y="252" width="208" height="178" rx="16" fill="#f6f0ff" stroke="#d9c6f5"/>
  <text x="1146" y="292" class="label" fill="#7447a8">05 / DWM</text>
  <text x="1146" y="329" class="card-title">公共汇总</text>
  <text x="1146" y="366" class="text">原子指标</text>
  <text x="1146" y="394" class="text">公共衍生指标</text>

  <path d="M1224 430 V488" class="arrow"/>

  <rect x="812" y="500" width="236" height="130" rx="16" fill="#fffaf0" stroke="#efd79a"/>
  <text x="838" y="540" class="label" fill="#a86413">06 / DM</text>
  <text x="838" y="577" class="card-title">分析宽表</text>
  <text x="838" y="612" class="text">面向主题 / 场景</text>

  <path d="M812 565 H744" class="arrow"/>

  <rect x="488" y="500" width="236" height="130" rx="16" fill="#eef5ff" stroke="#b9d7ff"/>
  <text x="514" y="540" class="label" fill="#275d99">07 / APP</text>
  <text x="514" y="577" class="card-title">应用输出</text>
  <text x="514" y="612" class="text">报表 / 接口 / 数据产品</text>

  <rect x="112" y="500" width="284" height="130" rx="16" fill="#f3f6fb" stroke="#d6deeb"/>
  <text x="138" y="540" class="label" fill="#5b6575">贯穿全链路</text>
  <text x="138" y="577" class="card-title">可信资产</text>
  <text x="138" y="612" class="text">血缘 / 质量 / 回刷 / 生命周期</text>

  <path d="M488 565 H408" class="arrow"/>

  <path d="M204 430 V488" class="arrow"/>
  <text x="252" y="478" class="small">可追溯</text>
  <text x="1116" y="478" class="small">口径收敛</text>
</svg>

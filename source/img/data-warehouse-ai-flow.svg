<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">From operational data to reusable data assets</title>
  <desc id="desc">A data warehouse pipeline that turns operational systems, logs, traces, object storage, and feedback into trusted data assets for BI, product analysis, engineering debugging, evaluation, and training.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:34px;font-weight:750;fill:#f8fafc}
      .subtitle{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:17px;fill:#94a3b8}
      .box{fill:#172033;stroke:#334155;stroke-width:1.5;rx:16;filter:url(#shadow)}
      .box-title{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:20px;font-weight:700;fill:#f8fafc}
      .box-text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;fill:#cbd5e1}
      .step{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;fill:#67e8f9}
      .arrow{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .pill{fill:#0f766e;opacity:0.95}
      .pill-text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;font-weight:650;fill:#ecfeff}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="64" y="54" width="1152" height="4" fill="url(#accent)" rx="2"/>
  <text x="64" y="108" class="title">From Business Data to Reusable Data Assets</text>
  <text x="64" y="139" class="subtitle">A generic warehouse path for analytics, debugging, evaluation, and training loops</text>

  <rect x="64" y="190" width="210" height="190" class="box"/>
  <text x="88" y="226" class="step">01 / sources</text>
  <text x="88" y="260" class="box-title">Operational Data</text>
  <text x="88" y="294" class="box-text">Business DB</text>
  <text x="88" y="320" class="box-text">Logs &amp; Trace</text>
  <text x="88" y="346" class="box-text">Object Storage</text>

  <path d="M 286 285 H 354" class="arrow"/>

  <rect x="366" y="190" width="220" height="190" class="box"/>
  <text x="390" y="226" class="step">02 / ingestion</text>
  <text x="390" y="260" class="box-title">Raw Landing</text>
  <text x="390" y="294" class="box-text">CDC / batch / stream</text>
  <text x="390" y="320" class="box-text">Permission boundary</text>
  <text x="390" y="346" class="box-text">Original records</text>

  <path d="M 598 285 H 666" class="arrow"/>

  <rect x="678" y="190" width="220" height="190" class="box"/>
  <text x="702" y="226" class="step">03 / modeling</text>
  <text x="702" y="260" class="box-title">Trusted Detail</text>
  <text x="702" y="294" class="box-text">Parse &amp; normalize</text>
  <text x="702" y="320" class="box-text">Define grain</text>
  <text x="702" y="346" class="box-text">Track lineage</text>

  <path d="M 910 285 H 978" class="arrow"/>

  <rect x="990" y="190" width="226" height="190" class="box"/>
  <text x="1014" y="226" class="step">04 / assets</text>
  <text x="1014" y="260" class="box-title">Data Products</text>
  <text x="1014" y="294" class="box-text">Wide tables</text>
  <text x="1014" y="320" class="box-text">Metrics &amp; datasets</text>
  <text x="1014" y="346" class="box-text">Use-case views</text>

  <rect x="126" y="474" width="1028" height="106" fill="#0b1220" stroke="#243244" stroke-width="1.5" rx="18"/>
  <text x="158" y="514" class="box-title">Consumers</text>
  <rect x="296" y="492" width="126" height="34" class="pill" rx="17"/>
  <text x="321" y="514" class="pill-text">BI / Reports</text>
  <rect x="442" y="492" width="162" height="34" class="pill" rx="17"/>
  <text x="462" y="514" class="pill-text">Product Analysis</text>
  <rect x="624" y="492" width="176" height="34" class="pill" rx="17"/>
  <text x="646" y="514" class="pill-text">Engineering Debug</text>
  <rect x="820" y="492" width="120" height="34" class="pill" rx="17"/>
  <text x="849" y="514" class="pill-text">Evaluation</text>
  <rect x="960" y="492" width="118" height="34" class="pill" rx="17"/>
  <text x="991" y="514" class="pill-text">Training</text>
  <text x="158" y="552" class="subtitle">The warehouse is useful only when downstream teams can repeatedly trust, query, and reuse the data.</text>

  <path d="M 1103 382 V 454" class="arrow"/>
  <path d="M 788 382 V 454" class="arrow"/>
  <path d="M 476 382 V 454" class="arrow"/>
</svg>
